<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Giao diện Upload Multer</title>
    <style>
        section { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Thực hành Upload File</h2>

    <section>
        <h3>Upload 1 file</h3>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="file">
            <button type="submit">Upload</button>
        </form>
    </section>

    <section>
        <h3>Upload nhiều file (Tối đa 17)</h3>
        <form action="/upload-multiple" method="POST" enctype="multipart/form-data">
            <input type="file" name="many-files" multiple>
            <button type="submit">Upload Nhiều File</button>
        </form>
    </section>
</body>
</html>
